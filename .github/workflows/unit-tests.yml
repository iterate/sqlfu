name: unit-tests

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  sqlfu:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Full build (including bundle-vendor) so the packed-package tests in
      # test/pkg.test.ts exercise the publish-shaped dist, not just the
      # runtime-only build that ensureBuilt() produces.
      - name: Build sqlfu
        run: pnpm --filter sqlfu build

      - name: Typecheck sqlfu
        run: pnpm --filter sqlfu typecheck

      - name: Run sqlfu tests
        run: pnpm --dir packages/sqlfu exec vitest --run

  pg-package:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Same docker compose dev runs locally. Keeps the "how do I run
      # this on my laptop" answer one shell command away from "how does
      # CI run this".
      - name: Start postgres via docker compose
        run: docker compose -f packages/pg/test/docker-compose.yml up -d --wait

      - name: Run @sqlfu/pg tests
        run: pnpm --filter @sqlfu/pg exec vitest --run

      - name: Stop postgres
        if: always()
        run: docker compose -f packages/pg/test/docker-compose.yml down
